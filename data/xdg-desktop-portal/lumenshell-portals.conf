# LumenShell portal backend routing.
#
# xdg-desktop-portal selects this file because the session sets
# XDG_CURRENT_DESKTOP=LumenShell (matched case-insensitively against
# <desktop>-portals.conf). Without a matching file no backend is chosen and
# Settings/ScreenCast/Screenshot portals silently do nothing.
#
#   Settings   -> gtk  (libadwaita reads color-scheme/accent from here)
#   ScreenCast -> wlr  (wlroots screencast for screen sharing)
#   Screenshot -> wlr
[preferred]
default=gtk
org.freedesktop.impl.portal.Settings=gtk
org.freedesktop.impl.portal.ScreenCast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
