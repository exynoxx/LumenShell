# LumenShell — Wayfire autostart snippet
#
# This file is a *reference snippet*, not a standalone Wayfire config.
# Wayfire reads exactly one config file (~/.config/wayfire.ini by default).
# To make LumenShell launch automatically when wayfire starts, copy the
# blocks below into that file — or, if you already have an [autostart]
# block, merge these keys into it.
#
# Quick install for a user who has no custom Wayfire config:
#   mkdir -p ~/.config
#   cat /usr/share/lumenshell/wayfire.ini.d/autostart.ini >> ~/.config/wayfire.ini
#
# Quick install when running from the build tree (no system install):
#   mkdir -p ~/.config
#   cat lumen-lockscreen/data/wayfire/lumenshell.ini.d/autostart.ini \
#       >> ~/.config/wayfire.ini
#   # Then either `source env.sh && export PATH=$PWD/build:$PATH` so the
#   # `lumen-*` commands below resolve, or replace each name with the full
#   # path to the build-tree binary, e.g. `panel = /home/you/.../build/lumen-panel`.
#
# What each line does:
#   * `core/plugins` — make sure the `autostart` plugin is loaded.
#   * `[autostart]`  — each key is an arbitrary label; the value is a shell
#                      command. Wayfire launches them once at startup.
#
# Order matters loosely: the panel and desktop want the compositor up first
# (Wayfire handles that before running autostart), and the lockscreen daemon
# should be running before idle/login1 events fire — so list it early.
#
# To temporarily disable a component, comment its line with `#`.

[core]
# Append `autostart` to your existing plugin list rather than overwriting it.
# Example (uncomment + edit to match your current value):
# plugins = alpha animate autostart command cube expo fast-switcher fisheye \
#           grid idle invert move oswitch place resize switcher vswitch \
#           window-rules wm-actions wobbly zoom

[autostart]
# Notifications come up early so any startup error toasts are visible.
notifications = lumen-notifications
# Panel + app drawer are the visible shell.
panel         = lumen-panel
desktop       = lumen-desktop
# OSD daemon listens for lumen-osdctl events (volume, brightness, etc.).
osd           = lumen-osd

# Optional extras — uncomment to enable.
# lockscreen    = lumen-lockscreen   # not yet built — planning stage
# background    = swaybg -i /path/to/wallpaper.jpg -m fill
# polkit_agent  = /usr/libexec/polkit-gnome-authentication-agent-1
# nm_applet     = nm-applet --indicator
